# For more information go to:
# https://www.nathannellans.com/post/deploying-bicep-files-part-4-azure-devops-pipelines

trigger: none
pr: none

pool: 
  vmImage: ubuntu-latest

steps:

#-------------------------------------------------------------
# New method using task BicepDeploy
#-------------------------------------------------------------

# Deploy Bicep to a Resource Group
- task: BicepDeploy@0
  inputs:
    type: deployment                                                                  # Optional. Default: deployment
    operation: create | validate | what-if                                            # Optional. Default: create
    scope: resourceGroup                                                              # Optional. Default: resourceGroup
    name: <deploymentName>                                                            # Optional. Default: auto-generated
    description: <deploymentDescription>                                              # Optional
    ConnectedServiceName: <serviceConnection>                                         # aka 'azureResourceManagerConnection'
    subscriptionId: <subId>                                                           # ??? Needed only if your armResourceManager is scoped to Management Group
    resourceGroupName: <rgName>
    location: <region>                                                                # ??? Not required for RG scope?
    templateFile: <main.bicep>
    parametersFile: <main.bicepparam>                                                 # Optional
    parameters: <inlineParameters>                                                    # Optional. Can be specified as a JSON or YAML object
    bicepVersion: <version>                                                           # Optional. Default: latest version
    maskedOutputs: <name,name,name>                                                   # Optional. Comma-separated list of Output names to be masked
    environment: azureCloud | azureChinaCloud | azureGermanCloud | azureUSGovernment  # Optional. Default: azureCloud
    whatIfExcludeChangeTypes: <type,type,type>                                        # Optional. Comma-separated list of change type to exclude when running What-if
    validationLevel: provider | template | providerNoRbac                             # Optional. Only applies to 'validate' operation

# Deploy Bicep to a Subscription
- task: BicepDeploy@0
  inputs:
    type: deployment                                                                  # Optional. Default: deployment
    operation: create | validate | what-if                                            # Optional. Default: create
    scope: subscription
    name: <deploymentName>                                                            # Optional. Default: auto-generated
    description: <deploymentDescription>                                              # Optional
    ConnectedServiceName: <serviceConnection>                                         # aka 'azureResourceManagerConnection'
    subscriptionId: <subId>                                                           # ??? Needed only if your armResourceManager is scoped to Management Group
    location: <region>                                                                # Location to store deployment metadata
    templateFile: <main.bicep>
    parametersFile: <main.bicepparam>                                                 # Optional
    parameters: <inlineParameters>                                                    # Optional. Can be specified as a JSON or YAML object
    bicepVersion: <version>                                                           # Optional. Default: latest version
    maskedOutputs: <name,name,name>                                                   # Optional. Comma-separated list of Output names to be masked
    environment: azureCloud | azureChinaCloud | azureGermanCloud | azureUSGovernment  # Optional. Default: azureCloud
    whatIfExcludeChangeTypes: <type,type,type>                                        # Optional. Comma-separated list of change type to exclude when running What-if
    validationLevel: provider | template | providerNoRbac                             # Optional. Only applies to 'validate' operation    

# Deploy Bicep to a Management Group
- task: BicepDeploy@0
  inputs:
    type: deployment                                                                  # Optional. Default: deployment
    operation: create | validate | what-if                                            # Optional. Default: create
    scope: managementGroup
    name: <deploymentName>                                                            # Optional. Default: auto-generated
    description: <deploymentDescription>                                              # Optional
    ConnectedServiceName: <serviceConnection>                                         # aka 'azureResourceManagerConnection'
    location: <region>                                                                # Location to store deployment metadata
    managementGroupId: <mgId>
    templateFile: <main.bicep>
    parametersFile: <main.bicepparam>                                                 # Optional
    parameters: <inlineParameters>                                                    # Optional. Can be specified as a JSON or YAML object
    bicepVersion: <version>                                                           # Optional. Default: latest version
    maskedOutputs: <name,name,name>                                                   # Optional. Comma-separated list of Output names to be masked
    environment: azureCloud | azureChinaCloud | azureGermanCloud | azureUSGovernment  # Optional. Default: azureCloud
    whatIfExcludeChangeTypes: <type,type,type>                                        # Optional. Comma-separated list of change type to exclude when running What-if
    validationLevel: provider | template | providerNoRbac                             # Optional. Only applies to 'validate' operation

# Deploy Bicep to a Tenant
- task: BicepDeploy@0
  inputs:
    type: deployment                                                                  # Optional. Default: deployment
    operation: create | validate | what-if                                            # Optional. Default: create
    scope: tenant
    name: <deploymentName>                                                            # Optional. Default: auto-generated
    description: <deploymentDescription>                                              # Optional
    ConnectedServiceName: <serviceConnection>                                         # aka 'azureResourceManagerConnection'
    location: <region>                                                                # Location to store deployment metadata
    tenantId: <tenantId>
    templateFile: <main.bicep>
    parametersFile: <main.bicepparam>                                                 # Optional
    parameters: <inlineParameters>                                                    # Optional. Can be specified as a JSON or YAML object
    bicepVersion: <version>                                                           # Optional. Default: latest version
    maskedOutputs: <name,name,name>                                                   # Optional. Comma-separated list of Output names to be masked
    environment: azureCloud | azureChinaCloud | azureGermanCloud | azureUSGovernment  # Optional. Default: azureCloud
    whatIfExcludeChangeTypes: <type,type,type>                                        # Optional. Comma-separated list of change type to exclude when running What-if
    validationLevel: provider | template | providerNoRbac                             # Optional. Only applies to 'validate' operation

#-------------------------------------------------------------
# Old method using task AzureResourceManagerTemplateDeployment
#-------------------------------------------------------------

# Deploy Bicep to a Resource Group
- task: AzureResourceManagerTemplateDeployment@3
  inputs:
    deploymentScope: Resource Group
    ConnectedServiceName: <serviceConnection>            # aka 'azureResourceManagerConnection'
    subscriptionName: <subName>                          # aka 'subscriptionId'. Optional. Needed only if your ConnectedServiceName is scoped to Management Group
    action: Create Or Update Resource Group | DeleteRG   # Optional. Default: Create or Update Resource Group
    resourceGroupName: <rgName>
    location: <region>
    deploymentMode: Incremental | Complete | Validation  # Optional. Default: Incremental
    deploymentName: <name>                               # Optional. Default: an automatically generated, unique value
    templateLocation: Linked artifact                    # Optional. Default: Linked artifact. This is the only option that works for Bicep
    csmFile: <main.bicep>                                # Valid only when 'Linked artifact' is selected
    csmParametersFile: <main.bicepparam>                 # Optional. Valid only when 'Linked artifact' is selected
    overrideParameters: <overrides>                      # Optional
    deploymentOutputs: <varName>                         # Optional
    addSpnToEnvironment: true | false                    # Optional. Default: false

# Deploy Bicep to a Subscription
- task: AzureResourceManagerTemplateDeployment@3
  inputs:
    deploymentScope: Subscription
    ConnectedServiceName: <serviceConnection>          # aka 'azureResourceManagerConnection'
    subscriptionName: <subName>                        # aka 'subscriptionId'. Optional. Needed only if your ConnectedServiceName is scoped to Management Group
    location: <region>
    deploymentMode: Incremental | Validation           # Optional. Default: Incremental
    deploymentName: <name>                             # Optional. Default: an automatically generated, unique value
    templateLocation: Linked artifact                  # Optional. Default: Linked artifact. This is the only option that works for Bicep
    csmFile: <main.bicep>                              # Valid only when 'Linked artifact' is selected
    csmParametersFile: <main.bicepparam>               # Optional. Valid only when 'Linked artifact' is selected
    overrideParameters: <overrides>                    # Optional
    deploymentOutputs: <varName>                       # Optional
    addSpnToEnvironment: true | false                  # Optional. Default: false

# Deploy Bicep to a Management Group
- task: AzureResourceManagerTemplateDeployment@3
  inputs:
    deploymentScope: Management Group
    ConnectedServiceName: <serviceConnection>          # aka 'azureResourceManagerConnection'. Must be scoped to Management Group
    location: <region>
    deploymentMode: Incremental | Validation           # Optional. Default: Incremental
    deploymentName: <name>                             # Optional. Default: an automatically generated, unique value
    templateLocation: Linked artifact                  # Optional. Default: Linked artifact. This is the only option that works for Bicep
    csmFile: <main.bicep>                              # Valid only when 'Linked artifact' is selected
    csmParametersFile: <main.bicepparam>               # Optional. Valid only when 'Linked artifact' is selected
    overrideParameters: 'overrides'                    # Optional
    deploymentOutputs: <varName>                       # Optional
    addSpnToEnvironment: true | false                  # Optional. Default: false
